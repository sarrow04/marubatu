<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>中央線 出店シミュレーター</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>body{margin:0;background:#070e1c;color:#dce8f5;font-family:sans-serif;}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback } = React;
const POP = {
  阿佐ヶ谷:{"10代以下":{女:1200,男:1100},"10代":{女:2600,男:2400},"20代":{女:2000,男:1800},"30代":{女:2200,男:2100},"40代":{女:2300,男:2200},"50代":{女:2000,男:1900},"60代":{女:1500,男:1400}},
  高円寺:{"10代以下":{女:1000,男:900},"10代":{女:2200,男:2100},"20代":{女:2800,男:2700},"30代":{女:2500,男:2400},"40代":{女:2400,男:2300},"50代":{女:1900,男:1800},"60代":{女:1300,男:1200}},
  荻窪:{"10代以下":{女:1800,男:1700},"10代":{女:3500,男:3300},"20代":{女:2400,男:2200},"30代":{女:3100,男:2900},"40代":{女:3300,男:3100},"50代":{女:2800,男:2600},"60代":{女:2100,男:1900}},
  中野:{"10代以下":{女:2200,男:2100},"10代":{女:5000,男:4800},"20代":{女:6200,男:6000},"30代":{女:5500,男:5300},"40代":{女:5100,男:4900},"50代":{女:4400,男:4200},"60代":{女:3500,男:3200}},
  吉祥寺:{"10代以下":{女:2000,男:1900},"10代":{女:4000,男:3800},"20代":{女:4200,男:3900},"30代":{女:4500,男:4100},"40代":{女:4600,男:4200},"50代":{女:3900,男:3600},"60代":{女:2900,男:2600}},
  西荻窪:{"10代以下":{女:791,男:762},"10代":{女:951,男:938},"20代":{女:2308,男:2007},"30代":{女:2277,男:2017},"40代":{女:2458,男:2124},"50代":{女:2684,男:2194},"60代":{女:1707,男:1625}},
};
const LOCS = {
  阿佐ヶ谷:[{id:"p",name:"パールセンター",rent:22,ff:1.2,rain:0.95,wk:1.12},{id:"s",name:"スターロード",rent:14,ff:0.75,rain:0.55,wk:1.05},{id:"j",name:"住宅街",rent:9,ff:0.45,rain:0.7,wk:0.95}],
  高円寺:[{id:"s",name:"高円寺商店街",rent:18,ff:1.1,rain:0.75,wk:1.25},{id:"j",name:"住宅街",rent:10,ff:0.55,rain:0.65,wk:0.9}],
  荻窪:[{id:"s",name:"駅前商圏",rent:24,ff:1.3,rain:0.8,wk:1.18},{id:"j",name:"住宅街",rent:11,ff:0.5,rain:0.68,wk:0.92}],
  中野:[{id:"b",name:"ブロードウェイ",rent:26,ff:1.5,rain:0.85,wk:1.3},{id:"j",name:"住宅街",rent:13,ff:0.6,rain:0.7,wk:1.0}],
  吉祥寺:[{id:"i",name:"井の頭公園",rent:30,ff:1.4,rain:0.65,wk:1.35},{id:"s",name:"サンロード",rent:28,ff:1.35,rain:0.88,wk:1.28},{id:"j",name:"住宅街",rent:14,ff:0.55,rain:0.72,wk:0.88}],
  西荻窪:[{id:"a",name:"アンティーク街",rent:16,ff:0.8,rain:0.6,wk:1.1},{id:"j",name:"住宅街",rent:9,ff:0.42,rain:0.68,wk:0.88}],
};
const PRESETS = [
  {id:"c",em:"☕",name:"カフェ",price:1100,ei:70,to:30,re:0,ur:40,av:52,cr:45},{id:"r",em:"🍜",name:"ラーメン",price:950,ei:95,to:5,re:0,ur:50,av:36,cr:48},
  {id:"p",em:"🍕",name:"ピザ",price:3500,ei:60,to:40,re:0,ur:80,av:24,cr:55},{id:"g",em:"🥩",name:"牛丼",price:1200,ei:70,to:30,re:0,ur:40,av:24,cr:45},
  {id:"b",em:"💈",name:"床屋",price:2500,ei:100,to:0,re:0,ur:60,av:12,cr:30},{id:"i",em:"🍺",name:"居酒屋",price:3200,ei:100,to:0,re:0,ur:35,av:18,cr:52}
];
const MW = {1:{su:.45,cl:.35,ra:.15,tm:.82},2:{su:.42,cl:.33,ra:.18,tm:.85},3:{su:.4,cl:.3,ra:.25,tm:.95},4:{su:.45,cl:.28,ra:.24,tm:1.05},5:{su:.48,cl:.28,ra:.22,tm:1.08},6:{su:.22,cl:.28,ra:.45,tm:.92},7:{su:.38,cl:.22,ra:.28,tm:.88},8:{su:.38,cl:.2,ra:.25,tm:.85},9:{su:.35,cl:.28,ra:.3,tm:.9},10:{su:.52,cl:.28,ra:.18,tm:1.05},11:{su:.48,cl:.32,ra:.18,tm:1.0},12:{su:.45,cl:.33,ra:.17,tm:.88}};
const yen = n => n<0 ? "−"+Math.round(Math.abs(n)).toLocaleString() : Math.round(n).toLocaleString()+"円";
const calcPop = (sd, a, g) => a.reduce((n, x) => n + (sd[x] ? g.reduce((m, y) => m + (sd[x][y]||0), 0) : 0), 0);

function simMonth(mNum, loc, p) {
  const wt = MW[mNum], days = new Date(2025, mNum, 0).getDate();
  let rev = 0;
  for (let d = 1; d <= days; d++) {
    const isWk = new Date(2025, mNum-1, d).getDay()%6===0, roll = Math.random();
    let wm = roll<wt.su ? 1.0 : (roll<wt.su+wt.cl ? 0.88 : (roll<wt.su+wt.cl+wt.ra ? loc.rain : 0.72));
    rev += ((p.price*p.ur*p.av*p.share)/3650000) * loc.ff * wm * wt.tm * (isWk?loc.wk:1.0);
  }
  return { mName:`${mNum}月`, rev, profit: rev - loc.rent*10000 - p.staff*p.wage*p.hrs*days - p.utility - rev*(p.cr/100) - p.ad };
}

function NumField({label, val, set}) { return <div style={{background:"#0d1825",padding:8,borderRadius:8,marginBottom:4}}><div style={{fontSize:10,color:"#4a6080"}}>{label}</div><input type="number" value={val} onChange={e=>set(+e.target.value)} style={{background:"transparent",color:"#fb923c",fontSize:18,fontWeight:"bold",border:"none",width:"100%"}}/></div>; }

function App() {
  const [st, setSt] = useState("阿佐ヶ谷"); const [li, setLi] = useState(0); const [tab, setTab] = useState("setup");
  const [pr, setPr] = useState(1100); const [ur, setUr] = useState(40); const [av, setAv] = useState(52); const [sh, setSh] = useState(3);
  const [cr, setCr] = useState(45); const [sf, setSf] = useState(3); const [wg, setWg] = useState(1100); const [hr, setHr] = useState(8); const [ut, setUt] = useState(30000); const [ad, setAd] = useState(30000);
  const [res, setRes] = useState(null);

  const loc = LOCS[st][li];
  const runSim = () => {
    let m = []; for(let i=4;i<=9;i++) m.push(simMonth(i, loc, {price:pr,ur,av,share:sh,cr,staff:sf,wage:wg,hrs:hr,utility:ut,ad}));
    setRes(m); setTab("result");
  };

  return (
    <div style={{maxWidth:600,margin:"0 auto",padding:12}}>
      <h2 style={{color:"#fb923c",textAlign:"center"}}>出店シミュレーター</h2>
      <div style={{display:"flex",gap:10,marginBottom:15}}>
        <button onClick={()=>setTab("setup")} style={{flex:1,padding:10,background:tab==="setup"?"#fb923c":"#1a2b42",color:"#fff",border:"none",borderRadius:8}}>設定</button>
        <button onClick={()=>setTab("result")} style={{flex:1,padding:10,background:tab==="result"?"#fb923c":"#1a2b42",color:"#fff",border:"none",borderRadius:8}}>結果</button>
      </div>

      {tab==="setup" && <div>
        <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:10}}>{Object.keys(LOCS).map(s=><button key={s} onClick={()=>{setSt(s);setLi(0);}} style={{padding:6,background:st===s?"#f43f5e":"#1a2b42",color:"#fff",border:"none",borderRadius:4}}>{s}</button>)}</div>
        <div style={{display:"flex",gap:4,marginBottom:15}}>{LOCS[st].map((l,i)=><button key={i} onClick={()=>setLi(i)} style={{padding:6,background:li===i?"#a855f7":"#1a2b42",color:"#fff",border:"none",borderRadius:4}}>{l.name}</button>)}</div>
        
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <NumField label="客単価(円)" val={pr} set={setPr} /> <NumField label="原価率(%)" val={cr} set={setCr} />
          <NumField label="利用率(%)" val={ur} set={setUr} /> <NumField label="年利用回数" val={av} set={setAv} />
          <NumField label="シェア(%)" val={sh} set={setSh} /> <NumField label="スタッフ数" val={sf} set={setSf} />
          <NumField label="時給(円)" val={wg} set={setWg} /> <NumField label="労働時間/日" val={hr} set={setHr} />
        </div>
        <button onClick={runSim} style={{width:"100%",padding:15,marginTop:15,background:"#34d399",color:"#000",fontWeight:"bold",border:"none",borderRadius:8}}>シミュレーション実行</button>
      </div>}

      {tab==="result" && res && <div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:15}}>
          <div style={{background:"#1a2b42",padding:12,borderRadius:8}}>総売上<br/><b style={{color:"#fb923c",fontSize:20}}>{yen(res.reduce((s,r)=>s+r.rev,0))}</b></div>
          <div style={{background:"#1a2b42",padding:12,borderRadius:8}}>総利益<br/><b style={{color:"#34d399",fontSize:20}}>{yen(res.reduce((s,r)=>s+r.profit,0))}</b></div>
        </div>
        {res.map((r,i)=><div key={i} style={{background:"#0d1825",padding:10,marginBottom:8,borderRadius:8,display:"flex",justifyContent:"space-between"}}>
          <span>{r.mName}</span><span style={{color:"#fb923c"}}>売上:{yen(r.rev)}</span><span style={{color:r.profit>=0?"#34d399":"#f43f5e"}}>利益:{yen(r.profit)}</span>
        </div>)}
      </div>}
    </div>
  );
}
const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
</script></body></html>
