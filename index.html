// リピート率が高いほど売上が安定（ベースに乗算）
function repeatBonus(repeatRate) { return 1 + (repeatRate / 100) * 0.15; }

function simulateMonth(monthNum, locData, p, adBoostRate) {
  const wt = MONTHLY_WEATHER[monthNum];
  const days = new Date(2025, monthNum, 0).getDate();
  let totalRev = 0, totalCust = 0;
  const wc = {sunny:0,cloudy:0,rain:0,extreme:0};

  const rb = repeatBonus(p.repeatRate);

  for (let d = 1; d <= days; d++) {
    const dow = new Date(2025, monthNum-1, d).getDay();
    const isWeekend = dow===0||dow===6;
    const roll = Math.random();
    let wMod, wKey;
    if      (roll < wt.sunny)                        {wKey="sunny"; wMod=1.0;}
    else if (roll < wt.sunny+wt.cloudy)              {wKey="cloudy";wMod=0.88;}
    else if (roll < wt.sunny+wt.cloudy+wt.rain)     {wKey="rain";  wMod=locData.rainResist;}
    else                                             {wKey="extreme";wMod=0.72;}
    wc[wKey]++;

    const base = (p.unitPrice * (p.usageRate/100) * p.annualVisits * (p.shareRate/100)) / 365;
    const wkMod = isWeekend ? locData.weekendMod : 1.0;
    const dailyRev = base * locData.footfall * wMod * wt.tempMod * wkMod * (1+adBoostRate) * rb;
    totalRev  += dailyRev;
    totalCust += Math.round(dailyRev / p.unitPrice);
  }

  const fixedRent  = locData.rentBase * 10000;
  const fixedLabor = p.staffCount * p.hourlyWage * p.hoursPerDay * days;
  const varCogs    = totalRev * (p.costRate/100);
  const miscCost   = p.miscMonthly;               // 水道光熱費・消耗品など
  const adCost     = p.adMonthly;
  const profit     = totalRev - fixedRent - fixedLabor - varCogs - adCost - miscCost;

  return {monthNum,monthName:`${monthNum}月`,days,totalRev,totalCust,fixedRent,fixedLabor,varCogs,adCost,miscCost,profit,wc};
}

const yen = (n) => {
  const s=n<0?"−":""; const a=Math.abs(n);
  if(a>=1e8) return s+(a/1e8).toFixed(2)+"億円";
  if(a>=1e4) return s+Math.round(a/1e4)+"万円";
  return s+Math.round(a).toLocaleString()+"円";
};

              <span style={{fontSize:11,color:"#64748b"}}>平均客単価</span>
              <span style={{fontSize:20,fontWeight:900,color:"#fb923c"}}>¥{unitPrice.toLocaleString()}</span>
            </div>
            <input type="range" min={100} max={20000} step={100} value={unitPrice}
              onChange={e=>{setUnitPrice(+e.target.value);setResults(null);}}
              style={{width:"100%",accentColor:"#fb923c",cursor:"pointer"}}/>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#334155",marginTop:1}}>
              <span>¥100</span><span>¥20,000</span>
            </div>
          </div>

          {/* 構成バー */}
          <div style={{display:"flex",height:14,borderRadius:6,overflow:"hidden",marginBottom:10,gap:1}}>
            {[{p:eatInPct,c:"#fb923c"},{p:takeoutPct,c:"#38bdf8"},{p:retailPct,c:"#a855f7"}].map((x,i)=>(
              x.p>0&&<div key={i} style={{flex:x.p,background:x.c,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:"#000"}}>{x.p>10?x.p+"%":""}</div>
            ))}
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
            {[
              {label:"🍽️ イートイン",val:eatInPct,  set:setEatInPct,  color:"#fb923c",note:"回転率が影響"},
              {label:"🥡 テイクアウト",val:takeoutPct,set:setTakeoutPct,color:"#38bdf8",note:"天気に比較的強い"},
              {label:"🛍️ 物販",       val:retailPct, set:setRetailPct, color:"#a855f7",note:"リピート購買が鍵"},
            ].map(({label,val,set,color,note})=>(
              <div key={label} style={{background:"#0f1825",borderRadius:9,padding:"9px 9px",border:`1px solid ${color}25`}}>
                <div style={{fontSize:10,color:"#64748b",marginBottom:5}}>{label}</div>
                <NumIn value={val} unit="%" min={0} max={100} color={color}
                  onChange={v=>{set(v);setResults(null);}}/>
                <div style={{fontSize:9,color:"#334155",marginTop:3}}>{note}</div>
              </div>
            ))}
          </div>
          {mixTotal!==100&&(
            <div style={{marginTop:6,fontSize:11,color:"#f43f5e"}}>⚠ 合計 {mixTotal}%（100%にしてください）</div>
          )}
        </Sec>

        {/* ── ターゲット ── */}
        <Sec title="ターゲット人口">
          <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:7}}>
            {ALL_AGES.map(a=>(
              <button key={a} onClick={()=>toggleAge(a)} style={{
                padding:"5px 11px",borderRadius:999,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,
                background:targetAges.includes(a)?"#1e3a5f":"#0f1825",
                color:targetAges.includes(a)?"#38bdf8":"#334155",
              }}>{a}</button>
            ))}
          </div>
          <div style={{display:"flex",gap:7,marginBottom:7}}>
            {ALL_GENDERS.map(g=>(
              <button key={g} onClick={()=>toggleG(g)} style={{
                padding:"5px 18px",borderRadius:999,border:"none",cursor:"pointer",fontSize:11,fontWeight:700,
                background:targetGenders.includes(g)?"#1e3a5f":"#0f1825",
                color:targetGenders.includes(g)?"#38bdf8":"#334155",
              }}>{g}</button>
            ))}
          </div>
          <div style={{fontSize:12,color:"#475569"}}>
            ターゲット人口: <strong style={{color:"#38bdf8",fontSize:15}}>{targetPop.toLocaleString()}人</strong>
          </div>
        </Sec>

        {/* ── コスト設定 ── */}
        <Sec title="コスト設定">
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
            <CostCard label="原価率" value={costRate} unit="%" min={5} max={90} color={costRate>65?"#f43f5e":costRate<40?"#34d399":"#fb923c"}
              onChange={v=>{setCostRate(v);setResults(null);}}
              note={costRate<40?"優秀":costRate<=60?"標準":"高め・要見直し"}/>
            <CostCard label="スタッフ時給" value={hourlyWage} unit="円" min={950} max={3000} color="#a855f7"
              onChange={v=>{setHourlyWage(v);setResults(null);}}
              note="東京最低賃金 1,113円"/>
            <CostCard label="1日の労働時間合計" value={hoursPerDay} unit="h" min={1} max={18} color="#a855f7"
              onChange={v=>{setHoursPerDay(v);setResults(null);}}
              note="スタッフ全員の合計時間/日"/>
            <CostCard label="スタッフ数" value={staffCount} unit="人" min={1} max={15} color="#a855f7"
              onChange={v=>{setStaffCount(v);setResults(null);}}
              note="1日あたりの出勤人数"/>
            <CostCard label="月次広告費" value={adMonthly} unit="円" min={0} max={500000} step={5000} color="#34d399"
              onChange={v=>{setAdMonthly(v);setResults(null);}}
              note={`集客 +${(adBoostRate*100).toFixed(1)}% ブースト`}/>
            <CostCard label="水道光熱費・雑費" value={miscMonthly} unit="円" min={0} max={200000} step={5000} color="#38bdf8"
              onChange={v=>{setMiscMonthly(v);setResults(null);}}
              note="水道・電気・消耗品など"/>
          </div>

          {/* 月次人件費プレビュー */}
          <div style={{marginTop:9,padding:"9px 12px",background:"#0d1526",borderRadius:9,fontSize:11,color:"#64748b",lineHeight:1.7}}>
            <div>月次人件費（目安）: <strong style={{color:"#d8b4fe"}}>{yen(staffCount*hourlyWage*hoursPerDay*30)}</strong>
              <span style={{fontSize:10,marginLeft:6}}>{staffCount}人 × {hourlyWage.toLocaleString()}円 × {hoursPerDay}h × 30日</span>
            </div>
            <div>月次固定費合計: <strong style={{color:"#38bdf8"}}>{yen(monthlyFixed)}</strong>
              <span style={{fontSize:10,marginLeft:6}}>（家賃＋人件費＋広告＋雑費）</span>
            </div>
            <div>損益分岐点（月商）: <strong style={{color:"#fb923c"}}>{yen(bepRevenue)}</strong>
              <span style={{fontSize:10,marginLeft:6}}>= 固定費 ÷ (1 − 原価率{costRate}%)</span>
            </div>
          </div>
        </Sec>

        {/* ── 席・回転・リピート・初期投資 ── */}
        <Sec title="店舗スペック">
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
            <CostCard label="座席数" value={seats} unit="席" min={0} max={100} color="#fb923c"
              onChange={v=>{setSeats(v);setResults(null);}} note="0=物販・テイクアウト専門"/>
            <CostCard label="1日の回転数" value={turnover} unit="回" min={0.5} max={10} step={0.5} color="#fb923c"
              onChange={v=>{setTurnover(v);setResults(null);}} note="席あたり1日何組入れ替わるか"/>
            <CostCard label="リピート率" value={repeatRate} unit="%" min={0} max={95} color="#34d399"
              onChange={v=>{setRepeatRate(v);setResults(null);}} note="高いほど売上が安定（最大+15%）"/>
            <CostCard label="初期投資（内装・設備）" value={openingCost} unit="万円" min={50} max={3000} step={50} color="#f43f5e"
              onChange={v=>{setOpeningCost(v);setResults(null);}} note="回収期間の計算に使用"/>
          </div>
          {seats>0&&(
            <div style={{marginTop:9,padding:"9px 12px",background:"#0d1526",borderRadius:9,fontSize:11,color:"#64748b"}}>
              席稼働時の理論日商: <strong style={{color:"#fb923c"}}>{yen(dailySeatRev*seats)}</strong>
              <span style={{fontSize:10,marginLeft:6}}>{seats}席 × {turnover}回転 × ¥{unitPrice.toLocaleString()}</span>
            </div>
          )}
        </Sec>

        {/* ── フェルミパラメータ ── */}
        <Sec title="フェルミ推計パラメータ">
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
            {[
              {label:"利用率",         val:usageRate,   set:setUsageRate,  unit:"%", max:100,note:"対象人口の何%が来店するか"},
              {label:"年間利用回数",   val:annualVisits,set:setAnnVisits,  unit:"回",max:120,note:"1人あたり年間利用回数"},
              {label:"市場シェア",     val:shareRate,   set:setShareRate,  unit:"%", max:30, note:"競合含む同業市場から自社集客割合"},
            ].map(({label,val,set,unit,max,note})=>(
              <div key={label} style={{background:"#0f1825",borderRadius:9,padding:"10px 10px"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:10,color:"#64748b"}}>{label}</span>
                  <span style={{fontWeight:900,color:"#fb923c"}}>{val}{unit}</span>
                </div>
                <input type="range" min={1} max={max} value={val}
                  onChange={e=>{set(+e.target.value);setResults(null);}}
                  style={{width:"100%",accentColor:"#fb923c"}}/>
                <div style={{fontSize:9,color:"#334155",marginTop:2}}>{note}</div>
              </div>
            ))}
            <div style={{background:"#0f1825",borderRadius:9,padding:"10px 10px",display:"flex",flexDirection:"column",justifyContent:"center"}}>
              <div style={{fontSize:10,color:"#64748b",marginBottom:3}}>年商ベース（補正前）</div>
              <div style={{fontSize:16,fontWeight:900,color:"#fb923c"}}>
                {yen(targetPop*(usageRate/100)*annualVisits*unitPrice*(shareRate/100)*locData.footfall)}
              </div>
              <div style={{fontSize:9,color:"#334155",marginTop:3,lineHeight:1.6}}>
                {targetPop.toLocaleString()}人 × {usageRate}% × {annualVisits}回<br/>
                × ¥{unitPrice.toLocaleString()} × {shareRate}% × 立地{locData.footfall.toFixed(2)}
              </div>
            </div>
          </div>
        </Sec>

        {/* ── 期間 ── */}
        <Sec title="シミュレーション期間">
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            <MonthSel value={startMonth} onChange={v=>{setStartM(v);setResults(null);}} label="開始月"/>
            <span style={{color:"#334155",fontSize:16,marginTop:14}}>→</span>
            <MonthSel value={endMonth}   onChange={v=>{setEndM(v);setResults(null);}}   label="終了月"/>
          </div>
          <div style={{marginTop:6,fontSize:11,color:"#334155"}}>
            天気は東京の月別気候データで日次ランダム生成（梅雨・猛暑・台風など反映）
          </div>
        </Sec>

        {/* 実行 */}
        <button onClick={runSim} disabled={running||mixTotal!==100} style={{
          width:"100%",padding:"15px",marginTop:10,borderRadius:13,border:"none",
          background:running||mixTotal!==100?"#1a1a2e":"linear-gradient(90deg,#fb923c,#f43f5e,#a855f7)",
          color:mixTotal!==100?"#334155":"#fff",
          fontSize:15,fontWeight:900,cursor:running||mixTotal!==100?"not-allowed":"pointer",
          boxShadow:running||mixTotal!==100?"none":"0 0 20px #f43f5e50",transition:"all .2s",
        }}>
          {running?"⏳ 計算中...":"▶ シミュレーション実行"}
        </button>

      </>}

      {/* ══════════ 結果タブ ══════════ */}
      {tab==="result" && !results && (
        <div style={{textAlign:"center",padding:"48px 0",color:"#334155",fontSize:13}}>
          設定タブで「実行」を押してください
        </div>
      )}

      {tab==="result" && results && (
        <div style={{marginTop:18}}>

          {/* KPI */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:12}}>
            {[
              {label:"期間売上合計",  val:totalRevenue,            color:"#fb923c"},
              {label:"期間利益合計",  val:totalProfit,             color:totalProfit>=0?"#34d399":"#f43f5e"},
              {label:"月平均利益",    val:totalProfit/results.length,color:totalProfit>=0?"#34d399":"#f43f5e"},
            ].map(({label,val,color})=>(
              <div key={label} style={{background:"#0f1825",borderRadius:12,padding:"12px 10px",borderTop:`3px solid ${color}`}}>
                <div style={{fontSize:9,color:"#475569",marginBottom:3}}>{label}</div>
                <div style={{fontSize:15,fontWeight:900,color}}>{yen(val)}</div>
              </div>
            ))}
          </div>

          {/* 初期投資回収 */}
          <div style={{background:"#0f1825",borderRadius:12,padding:"12px 14px",marginBottom:10,display:"flex",alignItems:"center",gap:14}}>
            <div style={{fontSize:28}}>🏁</div>
            <div>
              <div style={{fontSize:10,color:"#64748b",marginBottom:2}}>初期投資 {openingCost}万円 の回収</div>
              {breakEvenMonths
                ? <div style={{fontSize:16,fontWeight:900,color:"#34d399"}}>{breakEvenMonths}ヶ月目で回収見込み ✓</div>
                : <div style={{fontSize:16,fontWeight:900,color:"#f43f5e"}}>期間内に回収できない見込み</div>
              }
              <div style={{fontSize:10,color:"#334155",marginTop:2}}>損益分岐点（月商）: {yen(bepRevenue)}</div>
            </div>
          </div>

          {/* 月次棒グラフ */}
          <div style={{background:"#0f1825",borderRadius:13,padding:"16px 12px",marginBottom:10}}>
            <div style={{fontSize:11,fontWeight:700,color:"#64748b",marginBottom:10}}>月次売上 / 損益</div>
            <div style={{display:"flex",gap:3,alignItems:"flex-end",height:80,marginBottom:10}}>
              {results.map((r,i)=>{
                const h=Math.round((r.totalRev/maxRev)*72);
                return (
                  <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                    <div style={{fontSize:7,color:r.profit>=0?"#34d399":"#f43f5e",fontWeight:700,whiteSpace:"nowrap"}}>
                      {r.profit>=0?"+":""}{yen(r.profit).replace("万円","万")}
                    </div>
                    <div style={{width:"100%",height:h,
                      background:`linear-gradient(to top,${r.profit>=0?"#34d399":"#f43f5e"},#fb923c)`,
                      borderRadius:"4px 4px 0 0",minHeight:3}}/>
                    <div style={{fontSize:9,color:"#475569"}}>{r.monthName}</div>
                  </div>
                );
              })}
            </div>

            {/* テーブル */}
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:10,minWidth:580}}>
                <thead>
                  <tr style={{borderBottom:"1px solid #1a2540"}}>
                    {["月","天気","客数","売上","原価","人件費","広告","光熱","家賃","損益"].map(h=>(
                      <th key={h} style={{padding:"5px 4px",color:"#334155",fontWeight:600,textAlign:"right",whiteSpace:"nowrap"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {results.map((r,i)=>{
                    const wc=r.wc;
                    const ws=[wc.sunny&&`☀️${wc.sunny}`,wc.cloudy&&`🌥️${wc.cloudy}`,wc.rain&&`🌧️${wc.rain}`,wc.extreme&&`⚡${wc.extreme}`].filter(Boolean).join(" ");
                    return (
                      <tr key={i} style={{borderBottom:"1px solid #0d1526"}}>
                        <td style={{padding:"6px 4px",fontWeight:700,color:"#94a3b8"}}>{r.monthName}</td>
                        <td style={{padding:"6px 4px",fontSize:8,color:"#475569",whiteSpace:"nowrap"}}>{ws}</td>
                        <td style={{padding:"6px 4px",textAlign:"right",color:"#64748b"}}>{r.totalCust.toLocaleString()}</td>
                        <td style={{padding:"6px 4px",textAlign:"right",color:"#fb923c"}}>{yen(r.totalRev)}</td>
                        <td style={{padding:"6px 4px",textAlign:"right",color:"#475569"}}>{yen(r.varCogs)}</td>
                        <td style={{padding:"6px 4px",textAlign:"right",color:"#475569"}}>{yen(r.fixedLabor)}</td>
                        <td style={{padding:"6px 4px",textAlign:"right",color:"#475569"}}>{yen(r.adCost)}</td>
                        <td style={{padding:"6px 4px",textAlign:"right",color:"#475569"}}>{yen(r.miscCost)}</td>
                        <td style={{padding:"6px 4px",textAlign:"right",color:"#475569"}}>{yen(r.fixedRent)}</td>
                        <td style={{padding:"6px 4px",textAlign:"right",fontWeight:800,
                          color:r.profit>=0?"#34d399":"#f43f5e"}}>
                          {r.profit>=0?"+":""}{yen(r.profit)}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>

          {/* コスト構造バー */}
          {(()=>{
            const rev=totalRevenue||1;
            const bars=[
              {label:"原価",      val:results.reduce((s,r)=>s+r.varCogs,0),    color:"#f43f5e"},
              {label:"人件費",    val:results.reduce((s,r)=>s+r.fixedLabor,0), color:"#a855f7"},
              {label:"広告費",    val:results.reduce((s,r)=>s+r.adCost,0),     color:"#34d399"},
              {label:"光熱・雑費",val:results.reduce((s,r)=>s+r.miscCost,0),   color:"#38bdf8"},
              {label:"家賃",      val:results.reduce((s,r)=>s+r.fixedRent,0),  color:"#fb923c"},
            ];
            const totalCost=bars.reduce((s,b)=>s+b.val,0);
            return (
              <div style={{background:"#0f1825",borderRadius:13,padding:"14px 12px",marginBottom:10}}>
                <div style={{fontSize:11,fontWeight:700,color:"#64748b",marginBottom:10}}>期間コスト構造（売上比）</div>
                {bars.map(b=>(
                  <div key={b.label} style={{marginBottom:8}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:3}}>
                      <span style={{color:"#64748b"}}>{b.label}</span>
                      <span style={{fontWeight:700,color:b.color}}>
                        {yen(b.val)} <span style={{fontSize:9,color:"#334155"}}>({Math.round(b.val/rev*100)}%)</span>
                      </span>
                    </div>
                    <div style={{background:"#1a2540",borderRadius:999,height:7}}>
                      <div style={{width:`${Math.min(100,b.val/rev*100)}%`,background:b.color,borderRadius:999,height:7,transition:"width .5s"}}/>
                    </div>
                  </div>
                ))}
                <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid #1a2540",display:"flex",justifyContent:"space-between",fontSize:12}}>
                  <span style={{color:"#64748b"}}>利益率</span>
                  <span style={{fontWeight:900,color:totalProfit>=0?"#34d399":"#f43f5e"}}>
                    {totalProfit>=0?"+":""}{(totalProfit/rev*100).toFixed(1)}%
                  </span>
                </div>
              </div>
            );
          })()}

          <button onClick={()=>setTab("setup")} style={{
            width:"100%",padding:"12px",borderRadius:12,border:"1px solid #1a2540",
            background:"transparent",color:"#475569",cursor:"pointer",fontSize:13,fontWeight:700,
          }}>← 設定を変更して再実行</button>
        </div>
      )}
      </div>
    </div>
  );
}

// ── 数値入力コンポーネント（編集中は文字列で保持） ─────────────────
function NumIn({value,unit,min,max,color,onChange}) {
  const [raw,setRaw]=useState(String(value));
  const handleChange=(e)=>{
    const s=e.target.value;
    setRaw(s);
    const n=parseFloat(s);
    if(!isNaN(n)&&n>=min&&n<=max) onChange(n);
  };
  const handleBlur=()=>{
    const n=parseFloat(raw);
    if(isNaN(n)||n<min){setRaw(String(min));onChange(min);}
    else if(n>max){setRaw(String(max));onChange(max);}
    else{setRaw(String(n));onChange(n);}
  };
  return (
    <div style={{display:"flex",alignItems:"center",gap:4}}>
      <input type="text" inputMode="numeric" value={raw}
        onChange={handleChange} onBlur={handleBlur}
        style={{width:"100%",background:"transparent",border:"none",color,fontSize:20,fontWeight:900,outline:"none"}}/>
      <span style={{color:"#475569",fontSize:12}}>{unit}</span>
    </div>
  );
}

// CostCard：ラベル＋NumIn＋note まとめて表示
function CostCard({label,value,unit,min,max,step=1,color,onChange,note}) {
  return (
    <div style={{background:"#0f1825",borderRadius:10,padding:"10px 11px"}}>
      <div style={{fontSize:10,color:"#64748b",marginBottom:5}}>{label}</div>
      <NumIn value={value} unit={unit} min={min} max={max} color={color} onChange={onChange}/>
      {note&&<div style={{fontSize:9,color:"#334155",marginTop:3}}>{note}</div>}
    </div>
  );
}

function Sec({title,children}) {
  return (
    <div style={{marginTop:22}}>
      <div style={{fontSize:9,letterSpacing:3,color:"#334155",marginBottom:9,textTransform:"uppercase"}}>{title}</div>
      {children}
    </div>
  );
}
function Pill({active,onClick,children}) {
  return (
    <button onClick={onClick} style={{
      padding:"6px 15px",borderRadius:999,border:"none",cursor:"pointer",fontSize:12,fontWeight:700,
      background:active?"linear-gradient(90deg,#fb923c,#f43f5e)":"#0f1825",
      color:active?"#fff":"#334155",boxShadow:active?"0 0 12px #f43f5e40":"none",transition:"all .15s",
    }}>{children}</button>
  );
}
function MonthSel({value,onChange,label}) {
  return (
    <div style={{flex:1}}>
      <div style={{fontSize:10,color:"#64748b",marginBottom:4}}>{label}</div>
      <select value={value} onChange={e=>onChange(+e.target.value)}
        style={{width:"100%",padding:"8px 9px",borderRadius:9,border:"1px solid #1a2540",
          background:"#0d1526",color:"#e2e8f0",fontSize:14,fontWeight:700,cursor:"pointer"}}>
        {MONTH_LABELS.map((ml,i)=><option key={i} value={i+1}>{ml}</option>)}
      </select>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<ShopSim />);
</script>
</body>
</html>
