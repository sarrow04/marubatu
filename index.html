<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>中央線 出店シミュレーター Ver.6</title>
  <style>
    body { margin: 0; background: #070e1c; color: #dce8f5; font-family: sans-serif; padding-bottom: 50px; }
    .container { max-width: 600px; margin: 0 auto; padding: 15px; }
    .card { background: #0c1528; border-radius: 10px; padding: 15px; margin-bottom: 15px; border: 1px solid #1a2b42; }
    .title { color: #34d399; text-align: center; border-bottom: 1px solid #1a2b42; padding-bottom: 15px; }
    .btn { padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; box-sizing: border-box; font-size: 14px; transition: all 0.2s; }
    .btn-primary { background: #fb923c; color: #000; }
    .btn-primary:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    .btn-outline { background: transparent; border: 1px solid #fb923c; color: #fb923c; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .input-group { display: flex; flex-direction: column; margin-bottom: 10px; }
    .input-group label { font-size: 11px; color: #8ba3c7; margin-bottom: 3px; }
    .input-group input, .input-group select { background: #070e1c; color: #fb923c; border: 1px solid #1a2b42; padding: 8px; border-radius: 5px; font-size: 16px; font-weight: bold; width: 100%; box-sizing: border-box; outline: none; }
    
    table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; white-space: nowrap; }
    th, td { padding: 6px 4px; text-align: right; border-bottom: 1px solid #1a2b42; }
    th { color: #8ba3c7; font-weight: normal; background: #070e1c; }
    .hidden { display: none !important; }
    
    .radio-label { display: block; padding: 10px; background: #070e1c; border: 1px solid #1a2b42; margin-bottom: 5px; border-radius: 5px; cursor: pointer; font-size: 13px; line-height: 1.4; }
    .radio-label.active { background: #fb923c22; border-color: #fb923c; color: #fb923c; font-weight: bold; }
    .note { font-size: 10px; color: #64748b; font-weight: normal; margin-top: 3px; }
    
    .stats-box { background: #111e36; border-left: 4px solid #38bdf8; padding: 12px; border-radius: 4px; margin-top: 10px; font-size: 11px; line-height: 1.5; }
    .alert-danger { border-left-color: #f43f5e; background: #2e111a; }
    .alert-success { border-left-color: #34d399; background: #112e1a; }
    .inner-table { width: 100%; margin-top: 5px; margin-bottom: 5px; border: 1px solid #1a2b42; }
    .inner-table th, .inner-table td { font-size: 10px; padding: 4px; background: #070e1c; border: 1px solid #1a2b42; text-align: center; }
    
    /* 🆕 感度分析バー用 */
    .sensitivity-row { margin-bottom: 8px; }
    .sensitivity-bar-container { background: #070e1c; border-radius: 4px; height: 12px; width: 100%; margin-top: 2px; }
    .sensitivity-bar { background: linear-gradient(90deg, #38bdf8, #a855f7); height: 100%; border-radius: 4px; transition: width 0.5s; }
  </style>
</head>
<body>
  <div class="container">
    <h2 class="title">中央線 出店シミュレーター <span style="font-size:14px; color:#fb923c;">Ver.6</span></h2>
    
    <div class="grid" style="margin-bottom: 20px;">
      <button id="btn-tab-setup" class="btn btn-primary" onclick="switchTab('setup')">⚙️ 設定</button>
      <button id="btn-tab-result" class="btn btn-outline" onclick="switchTab('result')">📊 結果</button>
    </div>

    <div id="view-setup">
      <div class="card">
        <div style="font-size:12px; color:#8ba3c7; margin-bottom:10px;">1. エリアを選択</div>
        <select id="station" onchange="updateLocs()"></select>
        <div style="font-size:12px; color:#8ba3c7; margin-bottom:10px; margin-top:15px;">2. 立地を選択</div>
        <div id="loc-container"></div>
      </div>

      <div class="card">
        <div style="font-size:12px; color:#8ba3c7; margin-bottom:10px;">3. 業種テンプレート</div>
        <div class="grid" id="preset-container" style="grid-template-columns: repeat(3, 1fr);"></div>
      </div>

      <div class="card">
        <div style="font-size:12px; color:#8ba3c7; margin-bottom:10px;">4. 営業期間（月ごと）</div>
        <div class="grid">
          <div class="input-group"><label>開始月</label><select id="v-start-m"><option value="1">1月</option><option value="2">2月</option><option value="3">3月</option><option value="4" selected>4月</option><option value="5">5月</option><option value="6">6月</option><option value="7">7月</option><option value="8">8月</option><option value="9">9月</option><option value="10">10月</option><option value="11">11月</option><option value="12">12月</option></select></div>
          <div class="input-group"><label>終了月</label><select id="v-end-m"><option value="1">1月</option><option value="2">2月</option><option value="3">3月</option><option value="4">4月</option><option value="5">5月</option><option value="6">6月</option><option value="7">7月</option><option value="8">8月</option><option value="9" selected>9月</option><option value="10">10月</option><option value="11">11月</option><option value="12">12月</option></select></div>
        </div>
      </div>

      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
          <div style="font-size:12px; color:#8ba3c7;">5. 売上内訳の割合設定</div>
          <div id="pct-total-info" style="font-size:12px; font-weight:bold; color:#34d399;">合計: 100% (OK)</div>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:8px;">
          <div class="input-group"><label>🍽️ イートイン (%)</label><input type="number" id="v-ei" value="70" oninput="checkTotal()"></div>
          <div class="input-group"><label>🥡 テイクアウト (%)</label><input type="number" id="v-to" value="30" oninput="checkTotal()"></div>
          <div class="input-group"><label>🛍️ 物販 (%)</label><input type="number" id="v-re" value="0" oninput="checkTotal()"></div>
        </div>
      </div>

      <div class="card">
        <div style="font-size:12px; color:#8ba3c7; margin-bottom:10px;">6. 詳細数値を調整</div>
        <div class="grid">
          <div class="input-group" style="grid-column: span 2;"><label>月間想定客数 (ベース/広告前)</label><input type="number" id="v-cust" value="2000"></div>
          <div class="input-group"><label>客単価 (円)</label><input type="number" id="v-price" value="1100"></div>
          <div class="input-group"><label>原価率 (%)</label><input type="number" id="v-cr" value="45"></div>
          <div class="input-group"><label>月間営業日数 (日)</label><input type="number" id="v-opendays" value="25"></div>
          <div class="input-group"><label>スタッフ数/日</label><input type="number" id="v-staff" value="3"></div>
          <div class="input-group"><label>時給 (円)</label><input type="number" id="v-wage" value="1100"></div>
          <div class="input-group"><label>総労働時間/日 (h)</label><input type="number" id="v-hrs" value="8"></div>
          <div class="input-group"><label>その他固定費/月 (円)</label><input type="number" id="v-fixed" value="40000"></div>
          <div class="input-group"><label>広告費/月 (円)</label><input type="number" id="v-ad" value="30000"></div>
        </div>
      </div>

      <button id="btn-run" class="btn btn-primary" style="padding:15px; font-size:16px;" onclick="runSim()">▶ シミュレーション実行</button>
    </div>

    <div id="view-result" class="hidden">
      <div id="result-content"></div>
      <div class="grid" style="margin-top:20px;">
        <button class="btn btn-outline" onclick="switchTab('setup')">⚙️ 設定を戻す</button>
        <button class="btn btn-primary" onclick="runSim()">🔄 同じ条件で再計算 (検定)</button>
      </div>
    </div>
  </div>

  <script>
    const LOCS = {
      "阿佐ヶ谷": [{name:"パールセンター商店街", rent:50, ff:1.2, wk:1.12, rain:0.95, note:"一等地路面。アーケードで雨に強い"}, {name:"スターロード周辺", rent:32, ff:0.75, wk:1.05, rain:0.55, note:"夜型路地。バル・バー向きだが雨に大打撃"}, {name:"住宅街（駅から10分）", rent:18, ff:0.45, wk:0.95, rain:0.7, note:"固定客の生活圏。低家賃で勝負"}],
      "高円寺": [{name:"高円寺商店街コア", rent:45, ff:1.1, wk:1.25, rain:0.75, note:"サブカルの聖地。週末は広域から集客"}, {name:"住宅街（庚申通り）", rent:22, ff:0.55, wk:0.9, rain:0.65, note:"地元住民密着。常連率が高い"}],
      "荻窪": [{name:"駅前ロータリー商圏", rent:65, ff:1.3, wk:1.18, rain:0.8, note:"乗り換え客多数。抜群の集客力"}, {name:"住宅街（西荻側）", rent:24, ff:0.5, wk:0.92, rain:0.68, note:"落ち着いた住宅街。ランチ中心"}],
      "中野": [{name:"サンモール・BW周辺", rent:85, ff:1.5, wk:1.3, rain:0.85, note:"日本屈指の超高密度商圏。集客力最大級"}, {name:"住宅街（北口側）", rent:28, ff:0.6, wk:1.0, rain:0.7, note:"オフィスワーカーの昼需要もアリ"}],
      "吉祥寺": [{name:"サンロード商店街", rent:100, ff:1.35, wk:1.28, rain:0.88, note:"超一等地。全天候アーケードで圧倒的集客"}, {name:"井の頭公園エリア", rent:75, ff:1.4, wk:1.35, rain:0.65, note:"ブランド力抜群のお洒落激戦区。週末型"}, {name:"住宅街（東側五日市街道）", rent:35, ff:0.55, wk:0.88, rain:0.72, note:"高所得なファミリー層がターゲット"}]
    };

    const PRESETS = [
      {name:"☕ カフェ", p:1100, cr:45, ei:70, to:30, re:0}, {name:"🍜 ラーメン", p:950, cr:48, ei:95, to:5, re:0},
      {name:"🍕 ピザ", p:3500, cr:55, ei:60, to:40, re:0}, {name:"🍺 居酒屋", p:3200, cr:52, ei:100, to:0, re:0},
      {name:"✏️ その他", p:2000, cr:50, ei:50, to:30, re:20} 
    ];

    const M_DATA = {
      1: { tm: 0.82, rainP: 0.15, temp: "5℃" }, 2: { tm: 0.85, rainP: 0.18, temp: "6℃" }, 3: { tm: 0.95, rainP: 0.25, temp: "11℃" },
      4: { tm: 1.05, rainP: 0.24, temp: "16℃" }, 5: { tm: 1.08, rainP: 0.22, temp: "21℃" }, 6: { tm: 0.92, rainP: 0.45, temp: "23℃" },
      7: { tm: 0.88, rainP: 0.28, temp: "27℃" }, 8: { tm: 0.85, rainP: 0.25, temp: "29℃" }, 9: { tm: 0.90, rainP: 0.30, temp: "25℃" },
      10:{ tm: 1.05, rainP: 0.18, temp: "19℃" }, 11:{ tm: 1.00, rainP: 0.18, temp: "13℃" }, 12:{ tm: 0.88, rainP: 0.17, temp: "8℃" }
    };

    let selLocIdx = 0;
    const yen = (n) => Math.round(n).toLocaleString() + "円";
    const el = (id) => document.getElementById(id);
    const val = (id) => Number(el(id).value);

    window.onload = () => {
      const stSelect = el("station"); for(let s in LOCS) stSelect.innerHTML += `<option value="${s}">${s}</option>`;
      const preCont = el("preset-container");
      PRESETS.forEach((p, i) => { preCont.innerHTML += `<button class="btn btn-outline" style="margin-top:0; font-size:12px; padding:8px 4px;" onclick="applyPreset(${i})">${p.name}</button>`; });
      updateLocs(); checkTotal();
    };

    function checkTotal() {
      const total = val("v-ei") + val("v-to") + val("v-re"); const info = el("pct-total-info");
      if(total === 100) { info.innerHTML = "合計: 100% (OK)"; info.style.color = "#34d399"; el("btn-run").disabled = false; }
      else { info.innerHTML = `合計: ${total}% (100%)`; info.style.color = "#f43f5e"; el("btn-run").disabled = true; }
    }

    function updateLocs() {
      const st = el("station").value; const cont = el("loc-container"); cont.innerHTML = ""; selLocIdx = 0;
      LOCS[st].forEach((l, i) => { cont.innerHTML += `<label class="radio-label ${i===0?'active':''}" id="lbl-loc-${i}" onclick="selectLoc(${i})"><div style="display:flex; align-items:center;"><input type="radio" name="loc" ${i===0?'checked':''} style="margin-right:10px;"><span>${l.name} (家賃: ${l.rent}万円)</span></div><div class="note">${l.note}</div></label>`; });
    }

    function selectLoc(idx) { selLocIdx = idx; const st = el("station").value; LOCS[st].forEach((_, i) => { el(`lbl-loc-${i}`).className = "radio-label" + (i === idx ? " active" : ""); el(`lbl-loc-${i}`).querySelector("input").checked = (i === idx); }); }
    function applyPreset(idx) { const p = PRESETS[idx]; el("v-price").value = p.p; el("v-cr").value = p.cr; el("v-ei").value = p.ei; el("v-to").value = p.to; el("v-re").value = p.re; checkTotal(); }
    function switchTab(t) { if(t === 'setup') { el("view-setup").classList.remove("hidden"); el("view-result").classList.add("hidden"); el("btn-tab-setup").className = "btn btn-primary"; el("btn-tab-result").className = "btn btn-outline"; } else { el("view-setup").classList.add("hidden"); el("view-result").classList.remove("hidden"); el("btn-tab-setup").className = "btn btn-outline"; el("btn-tab-result").className = "btn btn-primary"; } window.scrollTo(0, 0); }

    function getStats(arr) {
      const n = arr.length; if (n < 2) return { mean: 0, v: 0, n };
      const mean = arr.reduce((a,b)=>a+b,0) / n;
      const v = arr.reduce((a,b)=>a+Math.pow(b-mean,2),0) / (n - 1);
      return { mean, v, n };
    }

    function runSim() {
      const st = el("station").value; const loc = LOCS[st][selLocIdx];
      const price = val("v-price"), cr = val("v-cr"), baseCust = val("v-cust");
      const staff = val("v-staff"), wage = val("v-wage"), hrs = val("v-hrs"), fixed = val("v-fixed"), ad = val("v-ad"), openDays = val("v-opendays");
      const startM = val("v-start-m"), endM = val("v-end-m");

      let monthsToRun = []; let cur = startM;
      while(true) { monthsToRun.push(cur); if (cur === endM) break; cur = cur === 12 ? 1 : cur + 1; if (monthsToRun.length > 24) break; }

      const eiPct = val("v-ei"), toPct = val("v-to"), rePct = val("v-re");
      const adBoost = Math.min(0.40, ad / 150000); const boostedCust = baseCust * (1 + adBoost);

      let totalRev = 0, totalProfit = 0, totalEI = 0, totalTO = 0, totalRE = 0;
      let totalCogs = 0, totalLabor = 0;
      let tableHTML = "";
      let weekdaySales = [], weekendSales = [];
      let crossTable = { sunnyBlack:0, rainBlack:0, sunnyRed:0, rainRed:0 };

      monthsToRun.forEach(m => {
        const days = new Date(2025, m, 0).getDate(); const mData = M_DATA[m];
        let mRevEI = 0, mRevTO = 0, mRevRE = 0, rainDays = 0;
        const dayFixedCost = (loc.rent * 10000 + fixed + ad) / openDays;

        for(let d = 1; d <= days; d++) {
          const isWk = new Date(2025, m-1, d).getDay() % 6 === 0;
          const isRain = Math.random() < mData.rainP; if(isRain) rainDays++;

          const dayBaseCust = boostedCust / 30;
          const common = loc.ff * mData.tm * (isWk ? loc.wk : 1.0);
          
          const dEI = (dayBaseCust * (eiPct / 100)) * common * (isRain ? loc.rain : 1.0) * price;
          const dTO = (dayBaseCust * (toPct / 100)) * common * (isRain ? (loc.rain + 1) / 2 : 1.0) * price;
          const dRE = (dayBaseCust * (rePct / 100)) * common * 1.0 * price;
          const dRev = dEI + dTO + dRE;

          mRevEI += dEI; mRevTO += dTO; mRevRE += dRE;

          if (d <= openDays) {
            if (isWk) weekendSales.push(dRev); else weekdaySales.push(dRev);
            const dProfit = dRev - (dRev * (cr / 100) + (staff * wage * hrs)) - dayFixedCost;
            if (isRain) { if (dProfit >= 0) crossTable.rainBlack++; else crossTable.rainRed++; } 
            else { if (dProfit >= 0) crossTable.sunnyBlack++; else crossTable.sunnyRed++; }
          }
        }
        
        const openRatio = Math.min(1, openDays / days);
        const finalEI = mRevEI * openRatio; const finalTO = mRevTO * openRatio; const finalRE = mRevRE * openRatio;
        const mRev = finalEI + finalTO + finalRE;
        
        const fRent = loc.rent * 10000;
        const fLabor = staff * wage * hrs * openDays;
        const vCogs = mRev * (cr/100);
        const mProfit = mRev - fRent - fLabor - fixed - ad;

        totalRev += mRev; totalEI += finalEI; totalTO += finalTO; totalRE += finalRE; totalProfit += mProfit;
        totalCogs += vCogs; totalLabor += fLabor;

        tableHTML += `<tr style="border-bottom: 1px solid #152040;"><td style="text-align:center; color:#fff;"><strong>${m}月</strong><br><span style="font-size:9px;color:#8ba3c7">${mData.temp}</span></td><td style="text-align:center; font-size:10px;">☀️${days - rainDays}日<br>☔️${rainDays}日</td><td style="color:#fb923c; font-weight:bold;">${yen(mRev)}</td><td>${yen(vCogs)}</td><td>${yen(fLabor)}</td><td style="font-weight:bold; color:${mProfit >= 0 ? "#34d399" : "#f43f5e"};">${yen(mProfit)}</td></tr>`;
      });

      // ── 🆕 【追加機能3：損益分岐点(BEP)客数の自動逆算】 ──
      const mCount = monthsToRun.length;
      const totalFixedCostNoLabor = (loc.rent * 10000 + fixed + ad) * mCount;
      const grandTotalFixedCost = totalFixedCostNoLabor + totalLabor; // 人件費を営業日固定費として扱う
      const bepRevenue = grandTotalFixedCost / (1 - (cr / 100));
      const bepTotalCustomers = bepRevenue / price;
      const bepMonthlyCustomers = bepTotalCustomers / mCount;
      const bepDailyCustomers = bepMonthlyCustomers / openDays;

      // ── 🆕 【追加機能2：パラメータ感度分析（確定データベース）】 ──
      // 各要素を10%「改善」した時の期間総利益の増加分を算出
      const currentProfit = totalProfit;
      const totalRentCost = (loc.rent * 10000) * mCount;
      const totalOtherFixed = fixed * mCount;
      const totalAdCost = ad * mCount;

      // ① 客数+10%（売上と原価が1.1倍、人件費・固定費はそのまま）
      const pCust = (totalRev * 1.1) - (totalCogs * 1.1) - totalLabor - totalRentCost - totalOtherFixed - totalAdCost;
      const impCust = Math.max(0, pCust - currentProfit);

      // ② 客単価+10%（客数・仕入総額一定の純粋な値上げ：売上1.1倍、原価はそのまま）
      const pPrice = (totalRev * 1.1) - totalCogs - totalLabor - totalRentCost - totalOtherFixed - totalAdCost;
      const impPrice = Math.max(0, pPrice - currentProfit);

      // ③ 原価率10%削減（原価総額が0.9倍、売上はそのまま）
      const pCr = totalRev - (totalCogs * 0.9) - totalLabor - totalRentCost - totalOtherFixed - totalAdCost;
      const impCr = Math.max(0, pCr - currentProfit);

      // ④ 時給(人件費)10%削減（人件費総額が0.9倍）
      const pWage = totalRev - totalCogs - (totalLabor * 0.9) - totalRentCost - totalOtherFixed - totalAdCost;
      const impWage = Math.max(0, pWage - currentProfit);

      // グラフ描画用の最大値を計算
      const maxImpact = Math.max(impCust, impPrice, impCr, impWage, 1);

      // ── 統計検定セクションのHTML作成 ──
      const s1 = getStats(weekdaySales); const s2 = getStats(weekendSales);
      let tValue = 0; let tResultHTML = "";
      if (s1.n > 1 && s2.n > 1) {
        const sd1 = Math.sqrt(s1.v); const sd2 = Math.sqrt(s2.v);
        tValue = (s1.mean - s2.mean) / Math.sqrt((s1.v / s1.n) + (s2.v / s2.n));
        const isSignif = Math.abs(tValue) > 1.96;
        tResultHTML = `
          <div class="stats-box ${isSignif ? 'alert-danger' : 'alert-success'}">
            <strong>【1】平日 vs 週末の集客t検定 (Welch's t-test)</strong><br>
            <table class="inner-table">
              <tr><th>グループ</th><th>サンプル数</th><th>日平均売上</th><th>標準偏差 (SD)</th></tr>
              <tr><td>平日 (月〜金)</td><td>${s1.n}日</td><td>${yen(s1.mean)}</td><td>${yen(sd1)}</td></tr>
              <tr><td>週末 (土・日)</td><td>${s2.n}日</td><td>${yen(s2.mean)}</td><td>${yen(sd2)}</td></tr>
            </table>
            計算結果: <strong>t値 = ${tValue.toFixed(3)}</strong> (しきい値: ±1.96)<br>
            判定: ${isSignif ? '⚠️ 曜日によるボトルネックが検出されました。' : '✅ 曜日による売上の偏りは統計的に有意ではありません。'}
          </div>`;
      }

      const A = crossTable.sunnyBlack, B = crossTable.rainBlack;
      const C = crossTable.sunnyRed,   D = crossTable.rainRed;
      const N = A + B + C + D;
      let chiResultHTML = "";
      if ((A+B)*(C+D)*(A+C)*(B+D) > 0) {
        const chi2 = (N * Math.pow(A*D - B*C, 2)) / ((A+B)*(C+D)*(A+C)*(B+D));
        const isSignif = chi2 > 3.84;
        chiResultHTML = `
          <div class="stats-box ${isSignif ? 'alert-danger' : 'alert-success'}">
            <strong>【2】天候 vs 日次損益のカイ二乗独立性検定 (2×2 分割表)</strong><br>
            <table class="inner-table">
              <tr><th>天候＼損益</th><th>黒字(日)</th><th>赤字(日)</th><th>合計</th></tr>
              <tr><td>晴れ・曇り</td><td>${A}日</td><td>${C}日</td><td><strong>${A+C}日</strong></td></tr>
              <tr><td>雨・悪天候</td><td>${B}日</td><td>${D}日</td><td><strong>${B+D}日</strong></td></tr>
              <tr><td><strong>合計</strong></td><td><strong>${A+B}日</strong></td><td><strong>${C+D}日</strong></td><td><strong>${N}日</strong></td></tr>
            </table>
            計算結果: <strong>χ²値 = ${chi2.toFixed(3)}</strong> (しきい値: 3.841)<br>
            判定: ${isSignif ? '⚠️ 天候（雨）が経営の有意なボトルネックとして統計的に証明されました。' : '✅ 天候リスクは統計的に許容範囲内です。'}
          </div>`;
      }

      const totalColor = totalProfit >= 0 ? "#34d399" : "#f43f5e";
      const displayBoost = (adBoost * 100).toFixed(0);

      // 現在の客数とBEP客数の比較判定
      const custDiff = boostedCust - bepMonthlyCustomers;
      const bepStatusHTML = custDiff >= 0 
        ? `<span style="color:#34d399; font-weight:bold;">黒字圏内 (必要数に対し +${Math.round(custDiff)}人/月の余裕)</span>`
        : `<span style="color:#f43f5e; font-weight:bold;">赤字圏内 (目標達成に あと ${Math.round(Math.abs(custDiff))}人/月の集客不足)</span>`;

      el("result-content").innerHTML = `
        <div class="grid" style="margin-bottom:15px;">
          <div class="card" style="margin:0; border-top:3px solid #fb923c;">
            <div style="font-size:11px; color:#8ba3c7;">期間売上合計 (${monthsToRun.length}ヶ月 / 広告ブースト: +${displayBoost}%)</div>
            <div style="font-size:18px; font-weight:bold; color:#fb923c;">${yen(totalRev)}</div>
            <div style="font-size:10px; color:#8ba3c7; margin-top:8px; border-top:1px dashed #1a2b42; padding-top:6px; line-height:1.4;">
              🍽️イートイン: ${yen(totalEI)} (${eiPct}%)<br>🥡テイクアウト: ${yen(totalTO)} (${toPct}%)<br>🛍️物販売上: ${yen(totalRE)} (${rePct}%)
            </div>
          </div>
          <div class="card" style="margin:0; border-top:3px solid ${totalColor}; display:flex; flex-direction:column; justify-content:center;">
            <div style="font-size:11px; color:#8ba3c7;">期間利益合計</div>
            <div style="font-size:22px; font-weight:bold; color:${totalColor};">${yen(totalProfit)}</div>
          </div>
        </div>

        <div class="card">
          <div style="font-size:12px; color:#8ba3c7; margin-bottom:8px;">🎯 損益分岐点（BEP）客数の逆算結果</div>
          <div style="font-size:12px; line-height:1.6; background:#070e1c; padding:10px; border-radius:6px; border:1px solid #1a2b42;">
            ・トントンに必要な月間客数: <strong style="color:#fb923c; font-size:15px;">${Math.round(bepMonthlyCustomers).toLocaleString()}人 / 月</strong><br>
            ・1営業日あたりの必要客数: <strong style="color:#fb923c;">${bepDailyCustomers.toFixed(1)}人 / 日</strong><br>
            ・現在のシミュレーション状況: ${bepStatusHTML}
          </div>
        </div>

        <div class="card">
          <div style="font-size:12px; color:#8ba3c7; margin-bottom:8px;">📊 パラメータ感度分析（どこを改善すれば一番儲かるか）</div>
          <div style="font-size:10px; color:#64748b; margin-bottom:10px;">各要素を10%改善（向上・削減）させた時の、期間利益の「増加額」の比較ランキングです。</div>
          
          <div class="sensitivity-row">
            <div style="display:flex; justify-content:space-between; font-size:11px;"><span>📈 客単価を10%上げる (値上げ効果)</span><strong style="color:#34d399;">+${yen(impPrice)}</strong></div>
            <div class="sensitivity-bar-container"><div class="sensitivity-bar" style="width: ${(impPrice / maxImpact) * 100}%;"></div></div>
          </div>
          <div class="sensitivity-row">
            <div style="display:flex; justify-content:space-between; font-size:11px;"><span>🏃‍♂️ 客数を10%増やす (集客力強化)</span><strong style="color:#34d399;">+${yen(impCust)}</strong></div>
            <div class="sensitivity-bar-container"><div class="sensitivity-bar" style="width: ${(impCust / maxImpact) * 100}%;"></div></div>
          </div>
          <div class="sensitivity-row">
            <div style="display:flex; justify-content:space-between; font-size:11px;"><span>📉 原価率を10%下げる (仕入・ロス削減)</span><strong style="color:#34d399;">+${yen(impCr)}</strong></div>
            <div class="sensitivity-bar-container"><div class="sensitivity-bar" style="width: ${(impCr / maxImpact) * 100}%;"></div></div>
          </div>
          <div class="sensitivity-row">
            <div style="display:flex; justify-content:space-between; font-size:11px;"><span>✂️ 時給(人件費)を10%削る (シフト効率化)</span><strong style="color:#34d399;">+${yen(impWage)}</strong></div>
            <div class="sensitivity-bar-container"><div class="sensitivity-bar" style="width: ${(impWage / maxImpact) * 100}%;"></div></div>
          </div>
        </div>

        <div class="card">
          <div style="font-size:12px; color:#8ba3c7; margin-bottom:5px;">📊 統計的検証・ボトルネックのデータ根拠</div>
          ${tResultHTML}
          ${chiResultHTML}
        </div>
        
        <div class="card" style="overflow-x:auto; padding:10px 5px;">
          <div style="font-size:12px; color:#8ba3c7; margin-bottom:10px; padding-left:10px;">月次シミュレーション詳細</div>
          <table>
            <thead><tr><th style="text-align:center;">月</th><th style="text-align:center;">天気</th><th>売上</th><th>原価</th><th>人件費</th><th>利益</th></tr></thead>
            <tbody>${tableHTML}</tbody>
          </table>
        </div>`;
      switchTab('result');
    }
  </script>
</body>
</html>
